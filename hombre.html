<section class="catalogo">

<h1>HOMBRE</h1>

<div class="subcategorias">

<div class="subcategoria">
ROPA
</div>

<div class="subcategoria">
ZAPATOS
</div>

</div>

<section class="productos" id="productos-hombre">

</section>

</section>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>

<script>

async function cargarProductos() {

    const productos = await obtenerProductos();

    const contenedor =
    document.getElementById("productos-hombre");

    let html = "";

    productos.forEach((producto,index)=>{

        if(producto.categoria !== "hombre"){
            return;
        }

        let opcionesTallas = "";

        if(producto.tallas){

            producto.tallas.forEach(talla => {

                opcionesTallas += `
                <option>${talla}</option>
                `;

            });

        }

        html += `

        <div class="producto">

            <div class="producto-img">
                <img src="${producto.imagen}">
            </div>

            <h3>${producto.nombre}</h3>

            <p class="precio">
                $${Number(producto.precio).toLocaleString("es-CL")}
            </p>

            <p>
                Stock: ${producto.stock || 0}
            </p>

            <select id="talla-${index}">
                ${opcionesTallas}
            </select>

            <button
            class="btn-producto"
            onclick="agregarProducto(
                '${producto.nombre}',
                ${producto.precio},
                '${producto.imagen}',
                document.getElementById('talla-${index}').value
            )">

            AGREGAR

            </button>

        </div>

        `;

    });

    if(html === ""){

        html = `

        <div style="
        width:100%;
        text-align:center;
        padding:60px 20px;
        ">

        <h2>
        No existen productos publicados
        </h2>

        <p>
        Ingresa productos desde el Panel Administrador.
        </p>

        </div>

        `;

    }

    contenedor.innerHTML = html;

}

cargarProductos();

</script>

</html>
